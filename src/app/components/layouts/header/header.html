<header class="encabezado">
  <div class="contenedor encabezado__interior">
    <a routerLink="/" class="marca" (click)="cerrarMenu()" aria-label="Biblioteca UTEQ — Inicio">
      <span class="marca__logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          <path d="M9 7h6M9 11h4" />
        </svg>
      </span>
      <span class="marca__texto">
        <strong>Biblioteca UTEQ</strong>
        <small>Universidad Tecnológica de Querétaro</small>
      </span>
    </a>

    <button
      class="hamburguesa"
      type="button"
      (click)="alternarMenu()"
      [class.hamburguesa--activa]="menuAbierto()"
      [attr.aria-expanded]="menuAbierto()"
      aria-controls="menu-principal"
      aria-label="Abrir o cerrar el menú de navegación"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav
      id="menu-principal"
      class="navegacion"
      [class.navegacion--abierta]="menuAbierto()"
      aria-label="Navegación principal"
    >
      <ul class="navegacion__lista">
        @for (enlace of enlaces; track enlace.ruta) {
          <li>
            <a
              [routerLink]="enlace.ruta"
              routerLinkActive="navegacion__enlace--activo"
              [routerLinkActiveOptions]="{ exact: enlace.exacto }"
              class="navegacion__enlace"
              (click)="cerrarMenu()"
            >
              {{ enlace.texto }}
            </a>
          </li>
        }
      </ul>

      <a routerLink="/login" class="boton boton--primario navegacion__cta" (click)="cerrarMenu()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
          <path d="M10 17l5-5-5-5" />
          <path d="M15 12H3" />
        </svg>
        Iniciar Sesión
      </a>
    </nav>
  </div>
</header>
